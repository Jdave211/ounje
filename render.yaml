services:
  - name: ounje-api
    type: web
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    buildFilter:
      paths:
        - package.json
        - render.yaml
        - server/**
        - supabase/migrations/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: OUNJE_RUNTIME_ENV
        value: production
      - key: OUNJE_ENABLE_RECIPE_INGESTION_POLLING
        value: "false"
      - key: YOUTUBE_DL_SKIP_DOWNLOAD
        value: "true"
      - key: OUNJE_ENABLE_AI_CALL_LOGGING
        value: "true"
      - key: AUTOSHOP_MANUAL_BETA_ONLY
        value: "true"
      - key: OUNJE_AI_DAILY_SPEND_LIMIT_USD
        value: "8"
      - key: OUNJE_AI_USER_DAILY_SPEND_LIMIT_USD
        value: "3"
      - key: APNS_BUNDLE_ID
        value: net.ounje
      - key: APNS_KEY_ID
        value: US3DPZX54S
      - key: APNS_TEAM_ID
        value: U8FPZXV6X6
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: KROGER_CLIENT_ID
        sync: false
      - key: KROGER_CLIENT_SECRET
        sync: false
      - key: BROWSER_USE_API_KEY
        sync: false
      - key: LUMBOX_API_KEY
        sync: false
      - key: AGENTSIM_API_KEY
        sync: false
      - key: IFRAMELY_API_KEY
        sync: false
      - key: TWO_CAPTCHA_API_KEY
        sync: false
      - key: RECIPE_IMAGE_BUCKET
        sync: false
      - key: APNS_KEY_BASE64
        sync: false
